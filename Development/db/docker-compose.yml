version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db_docker
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: moneytracker
      MYSQL_USER: tum
      MYSQL_PASSWORD: admin

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data: